global:
  namespace: backpack-exchange
  imagePullPolicy: IfNotPresent

postgres:
  image: postgres:16-alpine
  port: 5432
  user: backpack
  password: backpack_dev
  database: backpack
  storageSize: 10Gi
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

redis:
  image: redis:7-alpine
  port: 6379
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

gateway:
  replicaCount: 2
  image: backpack/gateway:latest
  port: 8080
  jwtSecret: backpack-dev-jwt-secret-change-in-production
  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

auth:
  replicaCount: 2
  image: backpack/auth-service:latest
  port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

orderService:
  replicaCount: 2
  image: backpack/order-service:latest
  port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

walletService:
  replicaCount: 2
  image: backpack/wallet-service:latest
  port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

marketDataService:
  replicaCount: 2
  image: backpack/market-data-service:latest
  port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
