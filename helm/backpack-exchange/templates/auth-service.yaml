apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: {{ .Values.auth.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
    spec:
      containers:
        - name: auth-service
          image: {{ .Values.auth.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.auth.port }}
          env:
            - name: PORT
              value: {{ .Values.auth.port | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backpack-secrets
                  key: jwt_secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backpack-secrets
                  key: database_url
          livenessProbe:
            httpGet:
              path: /api/v3/ping
              port: {{ .Values.auth.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v3/ping
              port: {{ .Values.auth.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{ toYaml .Values.auth.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app.kubernetes.io/name: auth-service
  ports:
    - port: {{ .Values.auth.port }}
      targetPort: {{ .Values.auth.port }}
      name: http
  type: ClusterIP
