{{- $services := dict "auth-service" .Values.auth "gateway" .Values.gateway "order-service" .Values.orderService "wallet-service" .Values.walletService "market-data-service" .Values.marketDataService -}}
{{- range $name, $service := $services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
spec:
  replicas: {{ $service.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          image: {{ $service.image }}
          ports:
            - containerPort: {{ $service.port }}
          env:
            - name: PORT
              value: {{ $service.port | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backpack-secrets
                  key: jwt_secret
            {{- if ne $name "gateway" }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backpack-secrets
                  key: database_url
            {{- end }}
            {{- if eq $name "gateway" }}
            - name: REDIS_URL
              value: redis://redis:6379
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8080
            - name: ORDER_SERVICE_URL
              value: http://order-service:8080
            - name: WALLET_SERVICE_URL
              value: http://wallet-service:8080
            - name: MARKET_DATA_SERVICE_URL
              value: http://market-data-service:8080
            {{- end }}
            {{- if eq $name "order-service" }}
            - name: WALLET_SERVICE_URL
              value: http://wallet-service:8080
            {{- end }}
            {{- if eq $name "market-data-service" }}
            - name: MARKET_DATA_SERVICE_PORT
              value: {{ $service.port | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/v3/ping
              port: {{ $service.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v3/ping
              port: {{ $service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
{{ toYaml $service.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
spec:
  selector:
    app.kubernetes.io/name: {{ $name }}
  ports:
    - port: {{ $service.port }}
      targetPort: {{ $service.port }}
      name: http
  type: ClusterIP
{{- end }}
