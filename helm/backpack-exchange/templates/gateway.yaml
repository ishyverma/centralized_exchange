apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
    spec:
      containers:
        - name: gateway
          image: {{ .Values.gateway.image }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
          env:
            - name: PORT
              value: {{ .Values.gateway.port | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backpack-secrets
                  key: jwt_secret
            - name: REDIS_URL
              value: redis://redis:6379
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8080
            - name: ORDER_SERVICE_URL
              value: http://order-service:8080
            - name: WALLET_SERVICE_URL
              value: http://wallet-service:8080
            - name: MARKET_DATA_SERVICE_URL
              value: http://market-data-service:8080
          livenessProbe:
            httpGet:
              path: /api/v3/ping
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v3/ping
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
{{ toYaml .Values.gateway.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - port: {{ .Values.gateway.port }}
      targetPort: {{ .Values.gateway.port }}
      name: http
  type: ClusterIP
