apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-service
spec:
  replicas: {{ .Values.marketDataService.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: market-data-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: market-data-service
    spec:
      containers:
        - name: market-data-service
          image: {{ .Values.marketDataService.image }}
          ports:
            - containerPort: {{ .Values.marketDataService.port }}
          env:
            - name: PORT
              value: {{ .Values.marketDataService.port | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backpack-secrets
                  key: jwt_secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backpack-secrets
                  key: database_url
            - name: MARKET_DATA_SERVICE_PORT
              value: {{ .Values.marketDataService.port | quote }}
          livenessProbe:
            httpGet:
              path: /api/v3/ping
              port: {{ .Values.marketDataService.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v3/ping
              port: {{ .Values.marketDataService.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{ toYaml .Values.marketDataService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: market-data-service
spec:
  selector:
    app.kubernetes.io/name: market-data-service
  ports:
    - port: {{ .Values.marketDataService.port }}
      targetPort: {{ .Values.marketDataService.port }}
      name: http
  type: ClusterIP
